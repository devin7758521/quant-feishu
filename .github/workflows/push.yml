name: Quant Alpha 飞书推送

on:
  schedule:
    - cron: '47 13 * * 1-5'   # 盘前预热 21:47 BJT
    - cron: '47 21 * * 1-5'   # 盘后总结 05:47 BJT
  workflow_dispatch:
    inputs:
      push_type:
        description: '推送类型'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - close

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev python3-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Scrapling browsers
        run: scrapling install || true

      - name: Determine push type
        id: push_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.push_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "13" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          else
            echo "type=close" >> $GITHUB_OUTPUT
          fi

      - name: Run push script
        env:
          FEISHU_WEBHOOK_URL:    ${{ secrets.FEISHU_WEBHOOK_URL }}
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          PUSH_TYPE:             ${{ steps.push_type.outputs.type }}
          LONGPORT_APP_KEY:      ${{ secrets.LONGPORT_APP_KEY }}
          LONGPORT_APP_SECRET:   ${{ secrets.LONGPORT_APP_SECRET }}
          LONGPORT_ACCESS_TOKEN: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
          DEEPSEEK_API_KEY:      ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:      ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_MODEL_2:        ${{ secrets.GEMINI_MODEL_2 }}
          SCRAPLING_MODE:        ${{ secrets.SCRAPLING_MODE }}
          GIST_PAT:              ${{ secrets.GIST_PAT }}
          GIST_ID:               ${{ secrets.GIST_ID }}
        run: python -u scripts/push.py
