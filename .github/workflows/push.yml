name: Quant Alpha 飞书推送

on:
  schedule:
    - cron: '47 13 * * 1-5'   # 开盘预热 21:47 BJT
    - cron: '47 14 * * 1-5'   # 开盘确认 22:47 BJT
    - cron: '17 18 * * 1-5'   # 半场复盘 02:17 BJT
    - cron: '47 21 * * 1-5'   # 收盘总结 05:47 BJT
  workflow_dispatch:
    inputs:
      push_type:
        description: '推送类型'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - open
          - midday
          - close

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine push type
        id: push_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.push_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "13" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ]; then
            echo "type=open" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ]; then
            echo "type=midday" >> $GITHUB_OUTPUT
          else
            echo "type=close" >> $GITHUB_OUTPUT
          fi

      - name: Run push script
        env:
          FEISHU_WEBHOOK_URL:   ${{ secrets.FEISHU_WEBHOOK_URL }}
          TWELVE_DATA_API_KEY:  ${{ secrets.TWELVE_DATA_API_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          PUSH_TYPE:            ${{ steps.push_type.outputs.type }}
        run: python -u scripts/push.py
